<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Track Your Order</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #timeline li { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h2>Track Your Order</h2>
  <input type="text" id="orderId" placeholder="Enter Order ID" />
  <button onclick="trackOrder()">Track</button>

  <div id="result" style="margin-top: 20px;">
    <h3>Status:</h3>
    <div id="status"></div>

    <h3>Estimated Delivery:</h3>
    <div id="eta"></div>

    <h3>Timeline:</h3>
    <ul id="timeline"></ul>

    <h3>Map:</h3>
    <div id="map"></div>
  </div>

  <script>
    function trackOrder() {
      const id = document.getElementById('orderId').value;
      fetch('get_tracking.php?order_id=' + id)
        .then(res => res.json())
        .then(data => {
          if (data.error) return alert(data.error);

          document.getElementById('status').innerText = data.porter_status || 'Pending';
          document.getElementById('eta').innerText = data.porter_eta || 'N/A';

          const list = document.getElementById('timeline');
          list.innerHTML = '';
          data.tracking_events.forEach(ev => {
            const li = document.createElement('li');
            li.innerText = `${ev.status} at ${ev.time}`;
            list.appendChild(li);
          });

          let mapUrl = '';
          if (data.delivery_lat && data.delivery_lng) {
            mapUrl = `https://maps.google.com/maps?q=${data.delivery_lat},${data.delivery_lng}&z=15&output=embed`;
          } else {
            mapUrl = `https://maps.google.com/maps?q=Plot No.57 (A Block), M.I.D.C., T.T.C.Industrial Area, Mahape, Navi Mumbai - 400710&output=embed`;
          }

          document.getElementById('map').innerHTML = `<iframe src="${mapUrl}" width="100%" height="300" style="border:0;" allowfullscreen loading="lazy"></iframe>`;
        });
    }
  </script>
</body>
</html>
