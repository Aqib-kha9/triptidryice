<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: green;
      margin-bottom: 1rem;
    }
    p {
      margin: 0.5rem 0;
    }
    .btn {
      margin-top: 1rem;
      background: #2d386a;
      color: #fff;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
    }
    .warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-weight: bold;
    }
    a {
      color: #007bff;
      text-decoration: none;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="warning" id="warningMessage">
      Please copy and save your Order ID now.<br/>
      Without this ID, you won't be able to track or view your order later.
    </div>
    <h1> Order Confirmed</h1>
    <p><strong>Order ID:</strong> <span id="orderId">Loading...</span></p>
    <button class="btn" id="copyBtn">Copy Order ID</button>
    <p><strong>Track Here:</strong> <a href="#" id="trackingLink" target="_blank">Loading...</a></p>
    <button class="btn" id="viewOrderBtn">View Full Order Details</button>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem("porterOrderData"));

    if (!data || !data.order_id) {
      document.getElementById("card").innerHTML = "<p style='color:red;'>Something went wrong. No order data found. You must complete checkout first.</p>";
    } else {
      const orderId = data.order_id;
      document.getElementById("orderId").textContent = orderId;
      document.getElementById("trackingLink").href = data.tracking_url || "#";
      document.getElementById("trackingLink").textContent = data.tracking_url || "Tracking link not available";

      document.getElementById("viewOrderBtn").addEventListener("click", () => {
        window.location.href = `findOrder.html?order_id=${encodeURIComponent(orderId)}`;
      });

      document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(orderId).then(() => {
          alert("Order ID copied! Please save it securely.");
        }).catch(() => {
          alert("Failed to copy Order ID. Please copy it manually.");
        });
      });
    }
  </script>
</body>
</html>
